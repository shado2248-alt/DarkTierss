openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: DARK TIERS Minecraft PvP Ranking Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: stats
    description: Platform statistics
  - name: players
    description: Player management
  - name: leaderboard
    description: Leaderboards
  - name: matches
    description: Match system
  - name: tiers
    description: Tier management
  - name: gamemodes
    description: Gamemode management
  - name: tests
    description: Tier test system
  - name: announcements
    description: Announcements
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  # STATS
  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Platform statistics
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /stats/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Recent platform activity (promotions, matches)
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentActivity"

  # GAMEMODES
  /gamemodes:
    get:
      operationId: listGamemodes
      tags: [gamemodes]
      summary: List all gamemodes
      responses:
        "200":
          description: List of gamemodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Gamemode"
    post:
      operationId: createGamemode
      tags: [gamemodes]
      summary: Create a gamemode (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GamemodeInput"
      responses:
        "201":
          description: Created gamemode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gamemode"

  /gamemodes/{id}:
    patch:
      operationId: updateGamemode
      tags: [gamemodes]
      summary: Update a gamemode (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GamemodeUpdate"
      responses:
        "200":
          description: Updated gamemode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gamemode"
    delete:
      operationId: deleteGamemode
      tags: [gamemodes]
      summary: Delete a gamemode (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # TIERS
  /tiers:
    get:
      operationId: listTiers
      tags: [tiers]
      summary: List all tiers
      parameters:
        - name: gamemodeId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of tiers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tier"
    post:
      operationId: createTier
      tags: [tiers]
      summary: Create a tier (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TierInput"
      responses:
        "201":
          description: Created tier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tier"

  /tiers/{id}:
    patch:
      operationId: updateTier
      tags: [tiers]
      summary: Update a tier (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TierUpdate"
      responses:
        "200":
          description: Updated tier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tier"
    delete:
      operationId: deleteTier
      tags: [tiers]
      summary: Delete a tier (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # PLAYERS
  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List players with optional filters
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: gamemodeId
          in: query
          schema:
            type: integer
        - name: region
          in: query
          schema:
            type: string
        - name: tierId
          in: query
          schema:
            type: integer
        - name: sortBy
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated player list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerList"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Create a player (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Created player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/{id}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get player profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player profile with stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerProfile"
        "404":
          description: Not found
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Delete a player (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /players/{id}/claim:
    post:
      operationId: claimPlayer
      tags: [players]
      summary: Claim a player profile (link to logged-in user)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Claimed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  username:
                    type: string
                  isVerified:
                    type: boolean
        "401":
          description: Not authenticated
        "409":
          description: Already claimed

  /players/{id}/ratings:
    get:
      operationId: getPlayerRatings
      tags: [players]
      summary: Get player ratings across all gamemodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player ratings per gamemode
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerRating"

  /staff:
    get:
      operationId: getStaff
      tags: [staff]
      summary: Get public staff/tester roster
      responses:
        "200":
          description: Staff roster
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"

  /player-match-history:
    get:
      operationId: listPlayerMatches
      tags: [players]
      summary: Get player match history by playerId query param
      parameters:
        - name: playerId
          in: query
          required: true
          schema:
            type: integer
        - name: gamemodeId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Match history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchList"

  # LEADERBOARD
  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get leaderboard
      parameters:
        - name: gamemodeId
          in: query
          schema:
            type: integer
        - name: region
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [rating, wins, matches]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResult"

  # MATCHES
  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List matches
      parameters:
        - name: gamemodeId
          in: query
          schema:
            type: integer
        - name: playerId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Match list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchList"
    post:
      operationId: createMatch
      tags: [matches]
      summary: Create a match (admin/moderator)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchInput"
      responses:
        "201":
          description: Created match with updated ratings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /matches/{id}:
    get:
      operationId: getMatch
      tags: [matches]
      summary: Get match details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Match details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
    patch:
      operationId: updateMatch
      tags: [matches]
      summary: Update a match (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchUpdate"
      responses:
        "200":
          description: Updated match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
    delete:
      operationId: deleteMatch
      tags: [matches]
      summary: Delete a match (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # TESTS
  /tests:
    get:
      operationId: listTests
      tags: [tests]
      summary: List tier test requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: gamemodeId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Test request list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestList"
    post:
      operationId: createTest
      tags: [tests]
      summary: Create a tier test request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestInput"
      responses:
        "201":
          description: Created test
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Test"

  /tests/{id}:
    get:
      operationId: getTest
      tags: [tests]
      summary: Get test details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Test"
    patch:
      operationId: updateTest
      tags: [tests]
      summary: Update test status (tester/admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestUpdate"
      responses:
        "200":
          description: Updated test
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Test"

  # ANNOUNCEMENTS
  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Announcement list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnouncementList"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create announcement (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Created announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    get:
      operationId: getAnnouncement
      tags: [announcements]
      summary: Get announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    patch:
      operationId: updateAnnouncement
      tags: [announcements]
      summary: Update announcement (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementUpdate"
      responses:
        "200":
          description: Updated announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete announcement (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ADMIN
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get public platform settings (server IP, Discord link)
      responses:
        "200":
          description: Platform settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"

  /admin/settings:
    patch:
      operationId: updateSettings
      tags: [admin]
      summary: Update platform settings (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin dashboard stats
      responses:
        "200":
          description: Admin statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users (admin)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"

  /admin/users/{id}:
    patch:
      operationId: updateUser
      tags: [admin]
      summary: Update user (role, suspend) (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/analytics:
    get:
      operationId: getAnalytics
      tags: [admin]
      summary: Analytics data for charts
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsData"

  /admin/players/{id}/reset-rating:
    post:
      operationId: resetPlayerRating
      tags: [admin]
      summary: Reset player rating (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetRatingInput"
      responses:
        "200":
          description: Reset complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /admin/promotions:
    get:
      operationId: listPromotions
      tags: [admin]
      summary: List all tier promotions (owner)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Promotion history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionList"

  /admin/set-tier-by-username:
    post:
      operationId: setTierByUsername
      tags: [admin]
      summary: Set tier for player by username, creates player if not registered
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetTierByUsernameInput"
      responses:
        "200":
          description: Tier set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetTierByUsernameResult"

  /admin/players/{id}/change-tier:
    post:
      operationId: changePlayerTier
      tags: [admin]
      summary: Change player tier (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeTierInput"
      responses:
        "200":
          description: Tier changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    AuthUser:
      type: object
      required: [id, discordId, username, role]
      properties:
        id:
          type: integer
        discordId:
          type: string
        username:
          type: string
        displayName:
          type: ["string", "null"]
        avatar:
          type: ["string", "null"]
        role:
          type: string
          enum: [owner, admin, moderator, tester, user]
        isSuspended:
          type: boolean
        createdAt:
          type: string

    PlatformStats:
      type: object
      required: [totalPlayers, totalMatches, totalTests, onlinePlayers]
      properties:
        totalPlayers:
          type: integer
        totalMatches:
          type: integer
        totalTests:
          type: integer
        onlinePlayers:
          type: integer

    RecentActivity:
      type: object
      required: [recentMatches, recentPromotions]
      properties:
        recentMatches:
          type: array
          items:
            $ref: "#/components/schemas/Match"
        recentPromotions:
          type: array
          items:
            $ref: "#/components/schemas/TierPromotion"

    TierPromotion:
      type: object
      required: [id, playerId, playerName, gamemodeId, gamemodeName, fromTier, toTier, promotedAt]
      properties:
        id:
          type: integer
        playerId:
          type: integer
        playerName:
          type: string
        gamemodeId:
          type: integer
        gamemodeName:
          type: string
        fromTier:
          type: ["string", "null"]
        toTier:
          type: string
        promotedAt:
          type: string

    Gamemode:
      type: object
      required: [id, name, slug, description, isActive]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    GamemodeInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        isActive:
          type: boolean

    GamemodeUpdate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        isActive:
          type: boolean

    Tier:
      type: object
      required: [id, name, slug, rank, minRating, maxRating, color]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        rank:
          type: integer
        minRating:
          type: integer
        maxRating:
          type: ["integer", "null"]
        color:
          type: string
        gamemodeId:
          type: ["integer", "null"]
        createdAt:
          type: string

    TierInput:
      type: object
      required: [name, slug, rank, minRating, color]
      properties:
        name:
          type: string
        slug:
          type: string
        rank:
          type: integer
        minRating:
          type: integer
        maxRating:
          type: integer
        color:
          type: string
        gamemodeId:
          type: integer

    TierUpdate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        rank:
          type: integer
        minRating:
          type: integer
        maxRating:
          type: integer
        color:
          type: string

    Player:
      type: object
      required: [id, username, uuid, region, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        uuid:
          type: string
        region:
          type: string
