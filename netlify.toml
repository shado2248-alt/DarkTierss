[build]
  command   = "pnpm --filter @workspace/dark-tiers run build"
  publish   = "artifacts/dark-tiers/dist/public"

[functions]
  directory     = "netlify/functions"
  node_bundler  = "esbuild"

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
