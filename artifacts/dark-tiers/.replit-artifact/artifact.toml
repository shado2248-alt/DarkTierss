kind = "web"
previewPath = "/"
title = "DARK TIERS"
version = "1.0.0"
id = "artifacts/dark-tiers"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18468

[services.development]
run = "pnpm --filter @workspace/dark-tiers run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dark-tiers", "run", "build" ]
publicDir = "artifacts/dark-tiers/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18468"
BASE_PATH = "/"
